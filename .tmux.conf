# ===========================================================
# ~/.tmux.conf
# Tmux config for terminal-based R/Python/Bash work
# on HPC clusters and personal systems
#
# Authors / maintainers:
#   Thomas Girke (tgirke@ucr.edu)
#   https://github.com/tgirke/Nvim-R_Tmux
#
# Derived from and based on:
#   Tmux manual (Nicholas Marriott & contributors)
#   https://man.openbsd.org/tmux
#   https://github.com/tmux/tmux/wiki
#
#   tmux-sensible defaults (Bruno Sutic)
#   https://github.com/tmux-plugins/tmux-sensible
#   (escape-time, history-limit, terminal settings below
#    are aligned with tmux-sensible recommendations)
#
#   Prior Nvim-R-Tmux .tmux.conf by Thomas Girke
#   https://github.com/tgirke/Nvim-R_Tmux/blob/main/.tmux.conf
#
# Last tested: tmux 3.4
#
# NOTE: tmux >= 3.3 (full release, not rc) required for
# allow-passthrough (OSC 52 clipboard over SSH).
# Install tmux 3.4 from source if your system has an older version:
#   sudo apt install libevent-dev libncurses-dev build-essential bison
#   curl -LO https://github.com/tmux/tmux/releases/download/3.4/tmux-3.4.tar.gz
#   tar xzf tmux-3.4.tar.gz && cd tmux-3.4
#   ./configure --prefix=$HOME/.local && make && make install
# ===========================================================


# ===========================================================
# SECTION 1: Prefix key
# Changed from Ctrl-b to Ctrl-a (easier to type, matches
# GNU Screen convention familiar to HPC users).
# Ctrl-a Ctrl-a sends a literal Ctrl-a to the terminal.
# ===========================================================

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix


# ===========================================================
# SECTION 2: General settings
# Reference: https://man.openbsd.org/tmux#OPTIONS
# ===========================================================

# Window and pane numbering starts at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Large scrollback buffer
set -g history-limit 10000

# No delay after Esc — critical for Neovim responsiveness
# Recommended by tmux-sensible: https://github.com/tmux-plugins/tmux-sensible
set -s escape-time 0

# 256-color and true-color support for Neovim themes over SSH
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Sync window title with running command
set -g set-titles on
set -g set-titles-string "#T"


# ===========================================================
# SECTION 3: OSC 52 clipboard passthrough
#
# Allows Neovim (and the clip script) to write to the local
# system clipboard over SSH, without X11 forwarding.
# Works with: macOS iTerm2, Windows Terminal, most Linux terminals.
# Does NOT work with: MobaXterm (uses X11 clipboard instead —
#   which works automatically via MobaXterm's built-in X server).
# Requires tmux >= 3.3 final release.
# Reference: https://github.com/tmux/tmux/wiki/Clipboard
# ===========================================================

set -g allow-passthrough on
set -s set-clipboard on


# ===========================================================
# SECTION 4: Mouse support
#
# Enables click-to-focus, drag-to-resize, scroll wheel.
# When mouse is ON: use Shift+click to select text for
# terminal copy (or toggle off with Ctrl-a m).
# ===========================================================

set -g mouse on


# ===========================================================
# SECTION 5: Split pane keybindings
#
# | and - are more intuitive than the defaults % and "
# New splits open in the current pane's working directory.
# ===========================================================

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %


# ===========================================================
# SECTION 6: Pane navigation and resizing
# ===========================================================

# Move between panes with Ctrl-a + arrow
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Resize panes with Alt + arrow (no prefix needed)
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# Zoom/unzoom active pane
bind z resize-pane -Z


# ===========================================================
# SECTION 7: Miscellaneous bindings
# ===========================================================

# New window opens in current directory
bind c new-window -c "#{pane_current_path}"

# Toggle mouse on/off
bind m set -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"

# Reload config without restarting tmux
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"


# ===========================================================
# SECTION 8: Status bar
# Color reference: https://man.openbsd.org/tmux#STYLES
# ===========================================================

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left  '#[fg=colour233,bg=colour241,bold] #S '
set -g status-right '#[fg=colour233,bg=colour241,bold] %d %b %H:%M '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I:#W#F '


# ===========================================================
# SECTION 9: Default session layout
#
# Creates a "work" session with named windows when tmux
# starts fresh. Uses plain new/neww commands which are
# simple, reliable, and easy to customize.
#
# Usage:
#   tmux                         start new session with layout
#   tmux a                       reattach to existing session
#   tmux new-session -As work    create or reattach to "work"
#   Ctrl-a : kill-session        kill current session entirely
#
# To customize: add or remove 'neww -n name' lines below,
# or change window names to reflect your workflow.
#
# Windows:
#   1. main    — default landing window
#   2. editor  — open nvim here
#   3. shell   — file management, job submission
#   4. monitor — squeue, top, log watching
#   5. extra   — spare window
# ===========================================================

new-session -s work -n tab1
neww -n tab2
neww -n tab3
neww -n tab4
neww -n tab5
select-window -t 1


# ===========================================================
# QUICK REFERENCE
#
# Starting work (recommended daily workflow):
#   tmux new-session -As work
#                          Create or reattach to "work" session.
#                          Creates 3 windows on first launch:
#                            1. editor  (split: nvim | R/Python)
#                            2. shell   (job submission, files)
#                            3. monitor (squeue, top, logs)
#   tmux a                 reattach to most recent session
#
# Prefix: Ctrl-a (hold Ctrl + a, release, then next key)
#
# Sessions:
#   tmux new-session -As work   create or reattach to "work"
#   tmux new -s NAME            new named session
#   tmux a -t NAME              reattach to named session
#   tmux ls                     list sessions
#   Ctrl-a d                    detach
#   Ctrl-a s                    switch sessions
#   Ctrl-a $                    rename session
#
# Windows:
#   Ctrl-a c               new window
#   Ctrl-a n / p           next / previous window
#   Ctrl-a 1..9            jump to window by number
#   Ctrl-a ,               rename window
#   Ctrl-a &               close window
#
# Panes:
#   Ctrl-a |               split vertically
#   Ctrl-a -               split horizontally
#   Ctrl-a arrow           move to pane
#   Alt + arrow            resize pane (no prefix)
#   Ctrl-a z               zoom/unzoom pane
#   Ctrl-a o               rotate panes
#   Ctrl-a x               close pane
#
# Other:
#   Ctrl-a r               reload config
#   Ctrl-a m               toggle mouse on/off
#   Ctrl-a [               scroll/copy mode (q to exit)
#   Ctrl-a ?               list all keybindings
# ===========================================================
