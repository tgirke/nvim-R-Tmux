# Prefix: Ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# General
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -s escape-time 0
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g set-titles on
set -g set-titles-string "#T"

# OSC 52 clipboard passthrough (requires tmux >= 3.3 full release)
# Allows Neovim/clip to write to local clipboard over SSH without X11
set -g allow-passthrough on
set -s set-clipboard on

# OSC 52 clipboard passthrough — skip silently if tmux version too old
run-shell "tmux set -g allow-passthrough on 2>/dev/null; tmux set -s set-clipboard on 2>/dev/null; exit 0"

# Mouse
set -g mouse on

# Splits (| and - instead of % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Pane resize (Alt+arrow, no prefix)
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# Zoom
bind z resize-pane -Z

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Toggle mouse
bind m set -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Status bar
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left  '#[fg=colour233,bg=colour241,bold] #S '
set -g status-right '#[fg=colour233,bg=colour241,bold] %d %b %H:%M '
set -g status-right-length 50
set -g status-left-length 20
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I:#W#F '

# Default session with named windows
# Start with: tmux  (creates session)
# Reattach with: tmux a
# Kill session: Ctrl-a : kill-session
new-session -s work -n tab1
neww -n tab2
neww -n tab3
neww -n tab4
neww -n tab5
select-window -t 1
